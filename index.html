<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GrayScale Studio - Main Workspace</title>
    <meta
      name="description"
      content="Professional web application for grayscale image histogram equalization and expansion, built with Clean Architecture and DDD."
    />
    <link
      rel="icon"
      type="image/png"
      href="/assets/branding/grayscale-studio-isotipo.png"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#ffffff",
              "surface-variant": "#e0e3e5",
              "inverse-primary": "#b6c4ff",
              primary: "#0043c8",
              "on-tertiary-container": "#ffe3db",
              "on-primary-fixed-variant": "#003ab2",
              "on-secondary-fixed-variant": "#38485d",
              "surface-container-low": "#f2f4f6",
              "on-tertiary-fixed": "#3a0a00",
              tertiary: "#972800",
              "secondary-container": "#d0e1fb",
              "secondary-fixed-dim": "#b7c8e1",
              surface: "#f7f9fb",
              "outline-variant": "#c3c5d9",
              secondary: "#505f76",
              "on-secondary": "#ffffff",
              "primary-container": "#0057ff",
              "on-surface": "#191c1e",
              "on-primary-container": "#e5e8ff",
              "surface-container-highest": "#e0e3e5",
              "primary-fixed": "#dce1ff",
              "on-secondary-container": "#54647a",
              "on-surface-variant": "#434656",
              "on-secondary-fixed": "#0b1c30",
              "surface-dim": "#d8dadc",
              "tertiary-container": "#c13600",
              "tertiary-fixed-dim": "#ffb59f",
              "primary-fixed-dim": "#b6c4ff",
              "tertiary-fixed": "#ffdbd1",
              error: "#ba1a1a",
              "on-primary-fixed": "#001550",
              "surface-bright": "#f7f9fb",
              "on-tertiary-fixed-variant": "#862300",
              "on-background": "#191c1e",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#d3e4fe",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "inverse-surface": "#2d3133",
              "surface-container": "#eceef0",
              outline: "#737688",
              "surface-container-high": "#e6e8ea",
              "inverse-on-surface": "#eff1f3",
              "surface-tint": "#004ee7",
              "surface-container-lowest": "#ffffff",
              background: "#f7f9fb",
              "error-container": "#ffdad6",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              unit: "4px",
              md: "16px",
              gutter: "20px",
              lg: "24px",
              sm: "8px",
              xs: "4px",
              xl: "48px",
              margin: "32px",
            },
            fontFamily: {
              "body-sm": ["Poppins", "sans-serif"],
              "body-md": ["Poppins", "sans-serif"],
              "data-mono": ["Poppins", "sans-serif"],
              "display-lg": ["Poppins", "sans-serif"],
              "headline-md": ["Poppins", "sans-serif"],
              "label-caps": ["Poppins", "sans-serif"],
            },
            fontSize: {
              "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
              "data-mono": [
                "13px",
                {
                  lineHeight: "1.4",
                  letterSpacing: "0.02em",
                  fontWeight: "500",
                },
              ],
              "display-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
              "label-caps": [
                "12px",
                { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
    <!-- Styles are centralized in src/shared/styles/ and bundled by Vite -->
  </head>

  <body
    class="bg-background text-on-surface font-body-md min-h-screen flex flex-col antialiased"
  >
    <div
      id="loader-overlay"
      class="active fixed inset-0 backdrop-blur-sm flex items-center justify-center z-100"
    >
      <div class="flex flex-col items-center gap-md">
        <img
          src="assets/branding/grayscale-studio-isotipo.png"
          alt="GrayScale Studio"
          class="h-40 w-auto loader-isotipo"
        />
        <p
          class="font-data-mono text-on-surface font-semibold text-lg tracking-wider"
        >
          LOADING OPENCV ENGINE
        </p>
        <div class="w-40 h-1 bg-surface-variant rounded-full overflow-hidden">
          <div
            class="h-full bg-primary rounded-full animate-pulse"
            style="width: 60%"
          ></div>
        </div>
      </div>
    </div>

    <top-nav-bar class="hidden md:block"></top-nav-bar>

    <!-- Mobile Guard -->
    <div
      id="mobile-guard"
      class="flex md:hidden flex-col items-center justify-center flex-1 px-lg text-center gap-lg py-xl"
    >
      <div
        class="glass-panel p-xl rounded-xl flex flex-col items-center gap-lg max-w-md w-full border border-outline-variant shadow-lg relative overflow-hidden"
      >
        <!-- Decorative background glow -->
        <div
          class="absolute inset-0 bg-primary/5 blur-3xl rounded-full scale-150 transform -translate-y-1/2"
        ></div>

        <img
          src="assets/branding/grayscale-studio-full-logo.png"
          alt="GrayScale Studio"
          class="w-64 h-auto opacity-90 relative z-10"
        />

        <div class="flex flex-col gap-sm items-center relative z-10">
          <h2 class="font-headline-md text-on-surface">
            Larger Screen Required
          </h2>
          <p class="font-body-md text-on-surface-variant">
            Grayscale Studio is a professional tool optimized for precise
            histogram analysis and image manipulation. Please access this
            workspace from a tablet or desktop device.
          </p>
        </div>
      </div>
    </div>

    <main
      class="hidden md:grid flex-1 max-w-[1440px] w-full mx-auto px-lg pb-margin grid-cols-12 gap-gutter items-start mt-md relative"
    >
      <!-- Left Sidebar: Technical Controls -->
      <aside class="md:col-span-4 lg:col-span-3 flex flex-col gap-md">
        <image-info-panel id="image-info-panel"></image-info-panel>
        <processing-controls id="processing-controls"></processing-controls>
      </aside>

      <!-- Central Workspace -->
      <section
        class="md:col-span-8 lg:col-span-6 flex flex-col gap-md h-[calc(100vh-120px)] min-h-[600px]"
      >
        <error-alert id="main-error-alert"></error-alert>
        <workspace-drop-zone id="main-workspace"></workspace-drop-zone>
      </section>

      <!-- Right Sidebar: Analysis Panel -->
      <aside class="md:col-span-12 lg:col-span-3 flex flex-col gap-md h-full">
        <analysis-panel
          id="analysis-panel"
          class="flex-1 flex flex-col"
        ></analysis-panel>
      </aside>
    </main>

    <script
      async
      src="https://docs.opencv.org/4.8.0/opencv.js"
      type="text/javascript"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
