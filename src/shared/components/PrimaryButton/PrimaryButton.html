<!-- =============================================
     PRIMARYBUTTON — Botón Primario Reutilizable
     =============================================
     Template del componente botón con estilo primario (fondo azul, texto blanco).
     Renderiza un icono Material Symbols y texto de label, ambos poblados
     programáticamente.

     Componente: <primary-button>
     Slots: Ninguno — contenido autónomo
     Atributos: icon (string), label (string) — establecidos programáticamente
-->
<button class="bg-primary text-on-primary font-label-caps py-sm px-md rounded transition-colors shadow-sm flex items-center justify-center gap-sm w-full primary-button-root">
  <span class="material-symbols-outlined text-[18px] btn-icon"></span>
  <span class="btn-text"></span>
</button>
