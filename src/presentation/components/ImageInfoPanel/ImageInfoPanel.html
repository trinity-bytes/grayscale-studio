<!-- =============================================
     IMAGEINFOPANEL — Panel de Información de Imagen
     =============================================
     Template del componente que renderiza los metadatos de la imagen cargada:
     mini thumbnail en canvas, resolución, canales, profundidad de bit y formato.
     Incluye botón "Explorar Archivos" que se muestra tras cargar una imagen.

     Componente: <image-info-panel>
     Slots: Ninguno — contenido autónomo
     Atributos: Ninguno — el componente se controla programáticamente
-->
<div class="glass-panel rounded-lg p-md flex flex-col gap-sm">
  <div class="flex items-center gap-sm border-b border-outline-variant pb-sm">
    <span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">info</span>
    <h3 class="font-headline-md text-base">Información de Imagen</h3>
  </div>
  <!-- Mini Thumbnail (visible when image loaded) -->
  <div id="thumbnail-container" class="hidden flex justify-center py-sm">
    <canvas id="thumbnail-canvas" class="max-w-full max-h-24 rounded shadow-sm object-contain"></canvas>
  </div>
  <empty-state id="info-empty-state" icon="info" title="Sin Imagen Cargada" description="Sube una imagen para ver su información"></empty-state>
  <div id="info-content" class="flex flex-col gap-xs font-data-mono text-sm text-on-surface-variant">
    <div class="flex justify-between">
      <span>Resolución</span>
      <span id="res-val" class="text-on-surface font-medium">-</span>
    </div>
    <div class="flex justify-between">
      <span>Canales</span>
      <span id="chan-val" class="text-on-surface font-medium">-</span>
    </div>
    <div class="flex justify-between">
      <span>Profundidad de Bit</span>
      <span id="bit-val" class="text-on-surface font-medium">-</span>
    </div>
    <div class="flex justify-between">
      <span>Formato</span>
      <span id="fmt-val" class="text-on-surface font-medium">-</span>
    </div>
  </div>
  <!-- Browse Files Button (hidden until image loaded) -->
  <button id="btn-browse-info" class="hidden glass-sub-panel border-outline-variant text-on-surface font-label-caps py-sm px-lg rounded mt-sm hover:bg-surface-variant transition-colors flex items-center justify-center gap-xs">
    <span class="material-symbols-outlined text-sm">folder_open</span>
    Explorar Archivos
  </button>
</div>
