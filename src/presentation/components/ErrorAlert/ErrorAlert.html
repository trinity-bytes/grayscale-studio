<!-- =============================================
     ERRORALERT — Componente de Alerta de Error
     =============================================
     Template del componente que renderiza una alerta de error inline con
     mensaje descriptivo y botón de cierre. Se muestra dinámicamente cuando
     ocurre una excepción en el procesamiento de imágenes.

     Componente: <error-alert>
     Slots: Ninguno — contenido autónomo
     Atributos: Ninguno — el componente se controla programáticamente
-->
<div id="error-container" role="alert" aria-live="assertive" class="bg-error-container text-on-error-container rounded-lg p-sm flex items-center justify-between border border-error/20 mb-md shadow-sm">
  <div class="flex items-center gap-sm">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">error</span>
    <p id="error-message" class="font-body-sm font-medium">Ocurrió un error.</p>
  </div>
  <button id="btn-close" aria-label="Cerrar error" class="text-on-error-container hover:bg-error/10 p-xs rounded transition-colors">
    <span class="material-symbols-outlined text-[20px]">close</span>
  </button>
</div>
