<div class="glass-panel rounded-lg p-md flex flex-col gap-sm flex-1 h-full">
  <div class="flex items-center gap-sm border-b border-outline-variant pb-sm mb-sm">
    <span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">bar_chart</span>
    <h3 class="font-headline-md text-base">Analysis</h3>
  </div>

  <!-- Tabs Navigation -->
  <div class="flex gap-2 mb-2 border-b border-outline-variant pb-1" id="analysis-tabs" role="tablist" aria-label="Analysis tabs">
    <button class="tab-btn active font-label-md px-2 py-1 rounded" role="tab" aria-selected="true" aria-controls="tab-visual" id="tab-btn-visual" tabindex="0" data-target="tab-visual">Visual</button>
    <button class="tab-btn font-label-md px-2 py-1 rounded text-on-surface-variant" role="tab" aria-selected="false" aria-controls="tab-math-eq" id="tab-btn-math-eq" tabindex="-1" data-target="tab-math-eq">Math: Eq</button>
    <button class="tab-btn font-label-md px-2 py-1 rounded text-on-surface-variant" role="tab" aria-selected="false" aria-controls="tab-math-exp" id="tab-btn-math-exp" tabindex="-1" data-target="tab-math-exp">Math: Exp</button>
  </div>
  
  <!-- Visual Tab (Original & Result) -->
  <div id="tab-visual" class="tab-content flex flex-col gap-xs flex-1 h-full" role="tabpanel" aria-labelledby="tab-btn-visual">
    <empty-state class="tab-empty-state" icon="bar_chart" title="No Data Yet" description="Load an image to see histogram data"></empty-state>
    <!-- Original Histogram -->
    <div class="flex flex-col gap-xs mb-md flex-1">
      <span class="font-label-caps text-on-surface-variant text-xs">Original Histogram</span>
      <div class="glass-sub-panel rounded relative overflow-hidden flex items-end px-xs pb-xs border-b border-outline-variant h-full min-h-[120px] w-full">
         <canvas id="original-histogram-canvas" class="w-full h-full absolute inset-0"></canvas>
      </div>
    </div>
    
    <!-- Result Histogram -->
    <div class="flex flex-col gap-xs flex-1">
      <span class="font-label-caps text-primary text-xs">Result Histogram</span>
      <div class="glass-sub-panel rounded relative overflow-hidden flex items-end px-xs pb-xs border-b border-primary/30 bg-primary/5 h-full min-h-[120px] w-full">
         <canvas id="result-histogram-canvas" class="w-full h-full absolute inset-0"></canvas>
      </div>
    </div>
  </div>

  <!-- Math: Equalization Tab -->
  <div id="tab-math-eq" class="tab-content flex-col gap-xs flex-1 h-full hidden" role="tabpanel" aria-labelledby="tab-btn-math-eq">
    <empty-state class="tab-empty-state" icon="functions" title="No Data Yet" description="Process an image to see equalization math"></empty-state>
    <span class="font-label-caps text-on-surface-variant text-xs">CDF & Equalization Mapping</span>
    <div class="glass-sub-panel rounded relative overflow-hidden flex items-end px-xs pb-xs border-b border-outline-variant h-full min-h-[250px] w-full">
       <canvas id="math-eq-canvas" class="w-full h-full absolute inset-0"></canvas>
    </div>
    <div class="text-xs text-on-surface-variant mt-2 p-2 bg-surface-variant rounded">
      Formula: LUT(i) = round(CDF(i) * 255)
    </div>
  </div>

  <!-- Math: Expansion Tab -->
  <div id="tab-math-exp" class="tab-content flex-col gap-xs flex-1 h-full hidden" role="tabpanel" aria-labelledby="tab-btn-math-exp">
    <empty-state class="tab-empty-state" icon="linear_scale" title="No Data Yet" description="Process an image to see expansion math"></empty-state>
    <span class="font-label-caps text-on-surface-variant text-xs">Linear Expansion Mapping</span>
    <div class="glass-sub-panel rounded relative overflow-hidden flex items-end px-xs pb-xs border-b border-outline-variant h-full min-h-[250px] w-full">
       <canvas id="math-exp-canvas" class="w-full h-full absolute inset-0"></canvas>
    </div>
    <div class="text-xs text-on-surface-variant mt-2 p-2 bg-surface-variant rounded">
      Formula: LUT(i) = round((i - min) * 255 / (max - min))
    </div>
  </div>
</div>
