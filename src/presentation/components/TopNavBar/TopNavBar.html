<!-- =============================================
     TOPNAVBAR — Barra de Navegación Superior
     =============================================
     Template del componente que renderiza la barra de navegación sticky con
     logo, enlaces de sección (Espacio de Trabajo, Análisis, Historial), toggle
     de tema claro/oscuro y badge de estado de carga de WASM/OpenCV.

     Componente: <top-nav-bar>
     Slots: Ninguno — contenido autónomo
     Atributos: Ninguno — el componente se controla programáticamente
-->
<nav
  class="sticky top-0 z-50 w-full px-lg py-sm flex justify-center font-data-mono"
>
  <header
    class="w-full max-w-[1440px] flex items-center justify-between whitespace-nowrap border-b border-solid border-outline-variant px-lg py-sm glass-panel rounded-lg"
  >
    <div class="flex items-center gap-sm text-on-surface">
      <img
        src="assets/branding/grayscale-studio-full-logo-negativo.png"
        alt="GrayScale Studio Logo"
        class="h-8 w-auto"
      />
    </div>

    <div class="flex items-center gap-lg">
      <a
        id="nav-workspace"
        class="text-on-surface font-body-sm font-medium leading-normal hover:text-primary transition-colors"
        href="#"
        >Espacio de Trabajo</a
      >
      <a
        id="nav-analysis"
        class="text-on-surface-variant font-body-sm font-medium leading-normal hover:text-primary transition-colors"
        href="#"
        >Análisis</a
      >
      <a
        id="nav-history"
        class="text-on-surface-variant font-body-sm font-medium leading-normal hover:text-primary transition-colors"
        href="#"
        >Historial</a
      >

      <button
        id="theme-toggle"
        class="p-sm rounded-lg hover:bg-surface-variant transition-colors cursor-pointer"
        title="Alternar modo oscuro"
        aria-label="Alternar tema"
      >
        <span
          id="theme-icon-sun"
          class="material-symbols-outlined text-on-surface-variant"
          >light_mode</span
        >
        <span
          id="theme-icon-moon"
          class="material-symbols-outlined text-on-surface-variant hidden"
          >dark_mode</span
        >
      </button>

      <div
        id="wasm-badge"
        class="px-sm py-xs bg-surface-variant text-on-surface-variant rounded-full text-xs font-data-mono flex items-center gap-xs"
      >
        <span
          id="wasm-status-dot"
          class="size-2 rounded-full bg-secondary block animate-pulse"
        ></span>
        <span id="wasm-status-text">WASM: Cargando</span>
      </div>
    </div>
  </header>
</nav>
