<div id="drop-area" class="glass-panel rounded-lg flex-1 border-2 border-dashed border-outline-variant flex flex-col items-center justify-center relative overflow-hidden group transition-colors">
  
  <!-- Placeholder Content -->
  <div id="placeholder-content" class="flex flex-col items-center gap-sm text-center p-xl z-10 transition-opacity">
    <empty-state icon="cloud_upload" title="Subir Imagen" description="Arrastra tu imagen en escala de grises aquí, o haz clic para explorar archivos.">
      <button id="btn-browse" class="glass-sub-panel border-outline-variant text-on-surface font-label-caps py-sm px-lg rounded mt-sm hover:bg-surface-variant transition-colors">
        Explorar Archivos
      </button>
    </empty-state>
    <p id="drop-hint-text" class="hidden text-primary font-label-caps text-sm">Soltar imagen aquí</p>
    <input type="file" id="file-input" class="hidden" accept="image/jpeg, image/png, image/jpg" />
  </div>

  <!-- Canvas Container (Hidden by default) -->
  <div id="canvas-container" class="hidden w-full h-full flex flex-col gap-sm z-10 relative p-sm">
    <!-- Toolbar Overlay (visible when image loaded) -->
    <div id="workspace-toolbar" class="hidden flex items-center gap-sm justify-end">
      <button id="btn-equalize" class="glass-sub-panel border-outline-variant text-on-surface font-label-caps py-sm px-md rounded hover:bg-surface-variant transition-colors flex items-center gap-xs" title="Carga una imagen primero" disabled>
        <span class="material-symbols-outlined text-sm">equalizer</span>
        Ecualizar
      </button>
      <button id="btn-expand" class="glass-sub-panel border-outline-variant text-on-surface font-label-caps py-sm px-md rounded hover:bg-surface-variant transition-colors flex items-center gap-xs" title="Carga una imagen primero" disabled>
        <span class="material-symbols-outlined text-sm">expand</span>
        Expansión
      </button>
      <button id="btn-show-math" class="hidden glass-sub-panel border-primary text-primary font-label-caps py-sm px-md rounded hover:bg-primary/10 transition-colors flex items-center gap-xs">
        <span class="material-symbols-outlined text-sm">functions</span>
        Ver Operación Math
      </button>
    </div>
    <!-- Side-by-side canvases -->
    <div class="flex flex-1 gap-sm min-h-0">
      <!-- Original Image -->
      <div class="flex-1 flex flex-col gap-xs">
        <span class="font-label-caps text-on-surface-variant text-xs text-center">Original</span>
        <div class="flex-1 flex items-center justify-center">
          <canvas id="main-canvas" class="max-w-full max-h-full object-contain shadow-lg rounded"></canvas>
        </div>
      </div>
      <!-- Processed Image (Hidden until processing) -->
      <div id="processed-container" class="hidden flex-1 flex flex-col gap-xs">
        <span class="font-label-caps text-primary text-xs text-center">Procesado</span>
        <div class="flex-1 flex items-center justify-center">
          <canvas id="processed-canvas" class="max-w-full max-h-full object-contain shadow-lg rounded"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
